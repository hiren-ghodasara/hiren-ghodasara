<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 170" width="800" height="170">
  <defs>
    <style>
      @keyframes fi { from { opacity:0 } to { opacity:1 } }
      .t01{animation:fi .35s ease .10s both} .t02{animation:fi .35s ease .20s both}
      .t03{animation:fi .35s ease .30s both} .t04{animation:fi .35s ease .40s both}
      .t05{animation:fi .35s ease .55s both} .t06{animation:fi .35s ease .65s both}
      .t07{animation:fi .35s ease .75s both} .t08{animation:fi .35s ease .85s both}
      .t09{animation:fi .35s ease .95s both} .t10{animation:fi .35s ease 1.10s both}
      .t11{animation:fi .35s ease 1.20s both} .t12{animation:fi .35s ease 1.30s both}
      .t13{animation:fi .35s ease 1.40s both} .t14{animation:fi .35s ease 1.50s both}
      .t15{animation:fi .35s ease 1.65s both} .t16{animation:fi .35s ease 1.75s both}
      .t17{animation:fi .35s ease 1.85s both} .t18{animation:fi .35s ease 1.95s both}
      .t19{animation:fi .35s ease 2.05s both}
      text{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif}
    </style>
  </defs>
  <rect width="800" height="170" fill="#0d1117"/>

  <!-- Row label: Frontend -->
  <text x="16" y="28" font-size="9" font-weight="700" letter-spacing="1" fill="#fb923c">FRONTEND</text>

  <!-- Row 1 tags (orange #fb923c) — y=12 -->
  <g class="t01"><rect x="110" y="12" width="62" height="26" rx="13" fill="rgba(249,115,22,0.10)" stroke="#f9731655"/><text x="141" y="25" text-anchor="middle" dominant-baseline="central" font-size="11.5" font-weight="500" fill="#fb923c">React</text></g>
  <g class="t02"><rect x="180" y="12" width="72" height="26" rx="13" fill="rgba(249,115,22,0.10)" stroke="#f9731655"/><text x="216" y="25" text-anchor="middle" dominant-baseline="central" font-size="11.5" font-weight="500" fill="#fb923c">Next.js</text></g>
  <g class="t03"><rect x="260" y="12" width="96" height="26" rx="13" fill="rgba(249,115,22,0.10)" stroke="#f9731655"/><text x="308" y="25" text-anchor="middle" dominant-baseline="central" font-size="11.5" font-weight="500" fill="#fb923c">TypeScript</text></g>
  <g class="t04"><rect x="364" y="12" width="96" height="26" rx="13" fill="rgba(249,115,22,0.10)" stroke="#f9731655"/><text x="412" y="25" text-anchor="middle" dominant-baseline="central" font-size="11.5" font-weight="500" fill="#fb923c">JavaScript</text></g>

  <!-- Row label: Backend -->
  <text x="16" y="68" font-size="9" font-weight="700" letter-spacing="1" fill="#38bdf8">BACKEND</text>

  <!-- Row 2 tags (blue #38bdf8) — y=52 -->
  <g class="t05"><rect x="110" y="52" width="72" height="26" rx="13" fill="rgba(56,189,248,0.10)" stroke="#38bdf855"/><text x="146" y="65" text-anchor="middle" dominant-baseline="central" font-size="11.5" font-weight="500" fill="#38bdf8">Node.js</text></g>
  <g class="t06"><rect x="190" y="52" width="72" height="26" rx="13" fill="rgba(56,189,248,0.10)" stroke="#38bdf855"/><text x="226" y="65" text-anchor="middle" dominant-baseline="central" font-size="11.5" font-weight="500" fill="#38bdf8">Laravel</text></g>
  <g class="t07"><rect x="270" y="52" width="44" height="26" rx="13" fill="rgba(56,189,248,0.10)" stroke="#38bdf855"/><text x="292" y="65" text-anchor="middle" dominant-baseline="central" font-size="11.5" font-weight="500" fill="#38bdf8">PHP</text></g>
  <g class="t08"><rect x="322" y="52" width="76" height="26" rx="13" fill="rgba(56,189,248,0.10)" stroke="#38bdf855"/><text x="360" y="65" text-anchor="middle" dominant-baseline="central" font-size="11.5" font-weight="500" fill="#38bdf8">GraphQL</text></g>
  <g class="t09"><rect x="406" y="52" width="88" height="26" rx="13" fill="rgba(56,189,248,0.10)" stroke="#38bdf855"/><text x="450" y="65" text-anchor="middle" dominant-baseline="central" font-size="11.5" font-weight="500" fill="#38bdf8">REST APIs</text></g>

  <!-- Row label: Cloud -->
  <text x="16" y="108" font-size="9" font-weight="700" letter-spacing="1" fill="#4ade80">CLOUD</text>

