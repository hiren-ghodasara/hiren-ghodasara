  <g class="t10"><rect x="110" y="92" width="48" height="26" rx="13" fill="rgba(74,222,128,0.10)" stroke="#4ade8055"/><text x="134" y="105" text-anchor="middle" dominant-baseline="central" font-size="11.5" font-weight="500" fill="#4ade80">AWS</text></g>
  <g class="t11"><rect x="166" y="92" width="48" height="26" rx="13" fill="rgba(74,222,128,0.10)" stroke="#4ade8055"/><text x="190" y="105" text-anchor="middle" dominant-baseline="central" font-size="11.5" font-weight="500" fill="#4ade80">GCP</text></g>
  <g class="t12"><rect x="222" y="92" width="68" height="26" rx="13" fill="rgba(74,222,128,0.10)" stroke="#4ade8055"/><text x="256" y="105" text-anchor="middle" dominant-baseline="central" font-size="11.5" font-weight="500" fill="#4ade80">Docker</text></g>
  <g class="t13"><rect x="298" y="92" width="60" height="26" rx="13" fill="rgba(74,222,128,0.10)" stroke="#4ade8055"/><text x="328" y="105" text-anchor="middle" dominant-baseline="central" font-size="11.5" font-weight="500" fill="#4ade80">CI/CD</text></g>
  <g class="t14"><rect x="366" y="92" width="80" height="26" rx="13" fill="rgba(74,222,128,0.10)" stroke="#4ade8055"/><text x="406" y="105" text-anchor="middle" dominant-baseline="central" font-size="11.5" font-weight="500" fill="#4ade80">Keycloak</text></g>

  <!-- Row label: Data & AI -->
  <text x="16" y="148" font-size="9" font-weight="700" letter-spacing="1" fill="#c084fc">DATA &amp; AI</text>

  <!-- Row 4 tags (purple #c084fc) — y=132 -->
  <g class="t15"><rect x="110" y="132" width="76" height="26" rx="13" fill="rgba(192,132,252,0.10)" stroke="#c084fc55"/><text x="148" y="145" text-anchor="middle" dominant-baseline="central" font-size="11.5" font-weight="500" fill="#c084fc">MongoDB</text></g>
  <g class="t16"><rect x="194" y="132" width="62" height="26" rx="13" fill="rgba(192,132,252,0.10)" stroke="#c084fc55"/><text x="225" y="145" text-anchor="middle" dominant-baseline="central" font-size="11.5" font-weight="500" fill="#c084fc">MySQL</text></g>
  <g class="t17"><rect x="264" y="132" width="116" height="26" rx="13" fill="rgba(192,132,252,0.10)" stroke="#c084fc55"/><text x="322" y="145" text-anchor="middle" dominant-baseline="central" font-size="11.5" font-weight="500" fill="#c084fc">Elasticsearch</text></g>
  <g class="t18"><rect x="388" y="132" width="72" height="26" rx="13" fill="rgba(192,132,252,0.10)" stroke="#c084fc55"/><text x="424" y="145" text-anchor="middle" dominant-baseline="central" font-size="11.5" font-weight="500" fill="#c084fc">LLM / AI</text></g>
  <g class="t19"><rect x="468" y="132" width="84" height="26" rx="13" fill="rgba(192,132,252,0.10)" stroke="#c084fc55"/><text x="510" y="145" text-anchor="middle" dominant-baseline="central" font-size="11.5" font-weight="500" fill="#c084fc">AI Agents</text></g>
</svg>
